<style>
  .auth-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    margin: 40px auto;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  }

  .auth-header {
    text-align: center;
    margin-bottom: 32px;
  }

  .auth-header .auth-icon {
    width: 64px;
    height: 64px;
    background: var(--navy);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    color: var(--gold);
    font-size: 1.75rem;
  }

  .auth-header h1 {
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--text);
    margin: 0;
  }

  .auth-form {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .form-label {
    font-weight: 600;
    color: var(--text);
    font-size: 0.875rem;
  }

  .form-input {
    width: 100%;
    padding: 12px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.875rem;
    transition: var(--transition);
  }

  .form-input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201, 162, 39, 0.1);
  }

  .form-input::placeholder {
    color: var(--muted);
  }

  .form-input.error {
    border-color: var(--error);
  }

  .form-error-text {
    color: var(--error);
    font-size: 0.75rem;
    display: none;
  }

  .form-error-text.show {
    display: block;
  }

  .error-message {
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid var(--error);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--error);
    font-size: 0.875rem;
    display: none;
  }

  .error-message.show {
    display: block;
  }

  .btn-submit {
    width: 100%;
    padding: 14px 24px;
    background: var(--navy);
    color: var(--text);
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-submit:hover:not(:disabled) {
    background: #2a4a73;
  }

  .btn-submit:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .btn-submit .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .auth-footer {
    text-align: center;
    margin-top: 24px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.875rem;
  }

  .auth-footer a {
    color: var(--gold);
    font-weight: 600;
    margin-right: 4px;
  }

  .auth-footer a:hover {
    color: #d4af37;
  }

  @media (max-width: 480px) {
    .auth-card {
      padding: 24px;
    }
    .auth-header h1 {
      font-size: 1.5rem;
    }
  }
</style>

<div class="auth-card">
  <div class="auth-header">
    <div class="auth-icon">📝</div>
    <h1 data-i18n="auth.register">إنشاء حساب</h1>
  </div>

  <form id="registerForm" class="auth-form" novalidate>
    <div class="form-group">
      <label for="regName" class="form-label" data-i18n="auth.name">الاسم</label>
      <input type="text" id="regName" name="name" class="form-input" required minlength="2" placeholder="أدخل اسمك">
      <div class="form-error-text" id="regNameError" data-i18n="error.name_required">الاسم مطلوب (حرفين على الأقل)</div>
    </div>

    <div class="form-group">
      <label for="regEmail" class="form-label" data-i18n="auth.email">البريد الإلكتروني</label>
      <input type="email" id="regEmail" name="email" class="form-input" required placeholder="أدخل بريدك الإلكتروني">
      <div class="form-error-text" id="regEmailError" data-i18n="error.email_invalid">البريد الإلكتروني غير صالح</div>
    </div>

    <div class="form-group">
      <label for="regPassword" class="form-label" data-i18n="auth.password">كلمة المرور</label>
      <input type="password" id="regPassword" name="password" class="form-input" required minlength="6" placeholder="أدخل كلمة المرور">
      <div class="form-error-text" id="regPasswordError" data-i18n="error.password_short">كلمة المرور قصيرة جداً (6 أحرف على الأقل)</div>
    </div>

    <div class="form-group">
      <label for="regConfirmPassword" class="form-label" data-i18n="auth.confirm_password">تأكيد كلمة المرور</label>
      <input type="password" id="regConfirmPassword" name="confirmPassword" class="form-input" required placeholder="أعد إدخال كلمة المرور">
      <div class="form-error-text" id="regConfirmError" data-i18n="error.password_mismatch">كلمات المرور غير متطابقة</div>
    </div>

    <div class="error-message" id="registerError"></div>

    <button type="submit" class="btn-submit" id="registerSubmitBtn">
      <span class="btn-text" data-i18n="auth.register">إنشاء حساب</span>
    </button>
  </form>

  <div class="auth-footer">
    <span data-i18n="auth.have_account">لديك حساب؟</span>
    <a href="/login" data-link data-i18n="auth.login">تسجيل دخول</a>
  </div>
</div>

<script>
  function initRegister() {
    console.log('initRegister called');
    const form = document.getElementById('registerForm');
    const submitBtn = document.getElementById('registerSubmitBtn');
    const errorEl = document.getElementById('registerError');

    const nameInput = document.getElementById('regName');
    const emailInput = document.getElementById('regEmail');
    const passwordInput = document.getElementById('regPassword');
    const confirmInput = document.getElementById('regConfirmPassword');

    const nameError = document.getElementById('regNameError');
    const emailError = document.getElementById('regEmailError');
    const passwordError = document.getElementById('regPasswordError');
    const confirmError = document.getElementById('regConfirmError');

    if (!form) {
      alert('Form not found!');
      return;
    }

    function showFieldError(input, errorDiv) {
      input.classList.add('error');
      errorDiv.classList.add('show');
    }

    function hideFieldError(input, errorDiv) {
      input.classList.remove('error');
      errorDiv.classList.remove('show');
    }

    function hideAllErrors() {
      hideFieldError(nameInput, nameError);
      hideFieldError(emailInput, emailError);
      hideFieldError(passwordInput, passwordError);
      hideFieldError(confirmInput, confirmError);
      errorEl.classList.remove('show');
    }

    function setLoading(loading) {
      submitBtn.disabled = loading;
      if (loading) {
        submitBtn.innerHTML = '<span class="spinner"></span>';
      } else {
        const t = window.i18n ? window.i18n.t('auth.register') : 'إنشاء حساب';
        submitBtn.innerHTML = `<span class="btn-text">${t}</span>`;
      }
    }

    function validateEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      e.stopPropagation();
      console.log('Submit prevented');
      hideAllErrors();

      const name = nameInput.value.trim();
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const confirm = confirmInput.value;

      let hasError = false;

      if (!name || name.length < 2) {
        showFieldError(nameInput, nameError);
        hasError = true;
      }
      if (!email || !validateEmail(email)) {
        showFieldError(emailInput, emailError);
        hasError = true;
      }
      if (!password || password.length < 6) {
        showFieldError(passwordInput, passwordError);
        hasError = true;
      }
      if (password !== confirm) {
        showFieldError(confirmInput, confirmError);
        hasError = true;
      }

      if (hasError) return;

      setLoading(true);

      try {
        const result = await window.api.register(name, email, password);

        if (result.user) {
          window.currentUser = result;
          window.updateAuthUI();
          // Navigate to convert page
          window.location.href = '/convert';
        } else {
          errorEl.textContent = result.error || (window.i18n ? window.i18n.t('error.unknown') : 'حدث خطأ');
          errorEl.classList.add('show');
        }
      } catch (err) {
        let msg;
        try {
          const parsed = JSON.parse(err.message);
          msg = parsed.error;
        } catch {
          msg = err.message;
        }
        errorEl.textContent = msg || (window.i18n ? window.i18n.t('error.unknown') : 'حدث خطأ');
        errorEl.classList.add('show');
      } finally {
        setLoading(false);
      }
    });

    [nameInput, emailInput, passwordInput, confirmInput].forEach((input) => {
      input.addEventListener('input', () => {
        const errorDiv = input.nextElementSibling;
        if (errorDiv && errorDiv.classList.contains('form-error-text')) {
          hideFieldError(input, errorDiv);
        }
        errorEl.classList.remove('show');
      });
    });

    if (window.i18n) {
      window.i18n.updateDOM();
    }
  }

  window.initRegister = initRegister;
</script>
