<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="files.title">ملفاتي - MD → PDF</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="/assets/css/main.css" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <header class="navbar">
        <button class="sidebar-toggle" id="sidebarToggle">☰</button>
        <div class="navbar-brand">
          <span class="brand-icon">📄</span>
          <span class="brand-text">MD → PDF</span>
        </div>
        <div class="navbar-actions">
          <select class="lang-select" id="langSelect">
            <option value="ar">🇸🇦 العربية</option>
            <option value="en">🇬🇧 English</option>
          </select>
          <div class="user-menu" id="userMenu"></div>
        </div>
      </header>
      <div class="page-content" id="app">
        <div class="page files-page">
          <div class="page-header">
            <h1 data-i18n="files.title">ملفاتي</h1>
            <div class="storage-indicator">
              <span data-i18n="files.storage_used">المساحة المستخدمة</span>: 
              <span id="storageUsed">0 MB</span> / 
              <span id="storageLimit">100 MB</span>
              <span data-i18n="files.file_count">الملفات</span>: 
              <span id="fileCount">0</span> / <span id="fileLimit">20</span>
            </div>
          </div>
          
          <div class="files-list" id="filesList">
            <div class="loading" data-i18n="ui.loading">جاري التحميل...</div>
            
            <div class="empty-state" id="emptyState" style="display:none;">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
              </svg>
              <h3 data-i18n="files.empty_title">لا توجد ملفات محفوظة</h3>
              <p data-i18n="files.empty_desc">قم بتحويل ملفات Markdown إلى PDF وسيتم حفظها هنا</p>
            </div>
            
            <div class="table-container" id="filesTable" style="display:none;">
              <table class="table">
                <thead>
                  <tr>
                    <th data-i18n="files.name">الاسم</th>
                    <th data-i18n="files.date">التاريخ</th>
                    <th data-i18n="files.size">الحجم</th>
                    <th data-i18n="files.actions">الإجراءات</th>
                  </tr>
                </thead>
                <tbody id="filesTableBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="confirmModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" data-i18n="files.delete_confirm_title">تأكيد الحذف</h3>
        <button class="modal-close" id="confirmModalClose">✕</button>
      </div>
      <div class="modal-body">
        <p data-i18n="files.delete_confirm_msg">هل أنت متأكد من حذف هذا الملف؟ لا يمكن التراجع عن هذا الإجراء.</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="confirmCancel" data-i18n="ui.cancel">إلغاء</button>
        <button class="btn btn-danger" id="confirmDelete" data-i18n="ui.delete">حذف</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="/assets/js/router.js"></script>
  <script src="/assets/js/i18n.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/app.js"></script>
  <script>
    const FilesPage = {
      files: [],
      fileToDelete: null,
      storageLimit: 100 * 1024 * 1024,
      fileLimit: 20,

      init() {
        this.fetchFiles();
        this.setupEventListeners();
      },

      setupEventListeners() {
        document.getElementById('confirmModalClose').addEventListener('click', () => this.closeConfirmModal());
        document.getElementById('confirmCancel').addEventListener('click', () => this.closeConfirmModal());
        document.getElementById('confirmDelete').addEventListener('click', () => this.deleteFile());
      },

      async fetchFiles() {
        try {
          const response = await api.get('/files');
          if (response.success) {
            this.files = response.data.files || [];
            this.storageLimit = response.data.storageLimit || 100 * 1024 * 1024;
            this.fileLimit = response.data.fileLimit || 20;
            this.renderFiles();
            this.updateStorageIndicator();
          } else {
            this.showEmptyState();
            this.showToast(response.error?.message || 'files.fetch_error', 'error');
          }
        } catch (error) {
          this.showEmptyState();
          this.showToast('files.fetch_error', 'error');
        }
      },

      renderFiles() {
        const loadingEl = document.querySelector('.files-list .loading');
        const emptyStateEl = document.getElementById('emptyState');
        const filesTableEl = document.getElementById('filesTable');

        loadingEl.style.display = 'none';

        if (!this.files || this.files.length === 0) {
          this.showEmptyState();
          return;
        }

        emptyStateEl.style.display = 'none';
        filesTableEl.style.display = 'block';

        const tbody = document.getElementById('filesTableBody');
        tbody.innerHTML = this.files.map(file => `
          <tr data-file-id="${file.id}">
            <td>
              <div class="file-name-cell">
                <div class="file-icon">📄</div>
                <span class="file-name">${this.escapeHtml(file.name)}</span>
              </div>
            </td>
            <td>${this.formatDate(file.createdAt)}</td>
            <td>${this.formatSize(file.size)}</td>
            <td>
              <div class="file-actions">
                <button class="btn btn-sm btn-secondary" onclick="FilesPage.downloadFile('${file.id}')" title="${this.t('files.download')}">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                  </svg>
                  <span data-i18n="files.download">تحميل</span>
                </button>
                <button class="btn btn-sm btn-danger" onclick="FilesPage.showDeleteConfirm('${file.id}')" title="${this.t('files.delete')}">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                  </svg>
                  <span data-i18n="files.delete">حذف</span>
                </button>
              </div>
            </td>
          </tr>
        `).join('');
      },

      updateStorageIndicator() {
        const usedBytes = this.files.reduce((sum, f) => sum + (f.size || 0), 0);
        const usedMB = (usedBytes / (1024 * 1024)).toFixed(2);
        const limitMB = (this.storageLimit / (1024 * 1024)).toFixed(0);

        document.getElementById('storageUsed').textContent = `${usedMB} MB`;
        document.getElementById('storageLimit').textContent = `${limitMB} MB`;
        document.getElementById('fileCount').textContent = this.files.length;
        document.getElementById('fileLimit').textContent = this.fileLimit;
      },

      showEmptyState() {
        document.querySelector('.files-list .loading').style.display = 'none';
        document.getElementById('emptyState').style.display = 'block';
        document.getElementById('filesTable').style.display = 'none';
      },

      showDeleteConfirm(fileId) {
        this.fileToDelete = fileId;
        document.getElementById('confirmModal').classList.add('open');
      },

      closeConfirmModal() {
        document.getElementById('confirmModal').classList.remove('open');
        this.fileToDelete = null;
      },

      async deleteFile() {
        if (!this.fileToDelete) return;

        try {
          const response = await api.delete(`/files/${this.fileToDelete}`);
          if (response.success) {
            this.files = this.files.filter(f => f.id !== this.fileToDelete);
            this.renderFiles();
            this.updateStorageIndicator();
            this.showToast('files.delete_success', 'success');
          } else {
            this.showToast(response.error?.message || 'files.delete_error', 'error');
          }
        } catch (error) {
          this.showToast('files.delete_error', 'error');
        }

        this.closeConfirmModal();
      },

      downloadFile(fileId) {
        const file = this.files.find(f => f.id === fileId);
        if (file && file.url) {
          window.open(file.url, '_blank');
        } else {
          window.open(`/api/files/${fileId}/download`, '_blank');
        }
      },

      formatDate(dateString) {
        if (!dateString) return '-';
        const date = new Date(dateString);
        return date.toLocaleDateString('ar-SA', {
          year: 'numeric',
          month: 'short',
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        });
      },

      formatSize(bytes) {
        if (!bytes || bytes === 0) return '0 B';
        const units = ['B', 'KB', 'MB', 'GB'];
        let i = 0;
        let size = bytes;
        while (size >= 1024 && i < units.length - 1) {
          size /= 1024;
          i++;
        }
        return `${size.toFixed(1)} ${units[i]}`;
      },

      escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      },

      t(key) {
        return i18n.t(key);
      },

      showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        
        const icons = {
          success: '<svg xmlns="http://www.w3.org/2000/svg" class="toast-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>',
          error: '<svg xmlns="http://www.w3.org/2000/svg" class="toast-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>',
          warning: '<svg xmlns="http://www.w3.org/2000/svg" class="toast-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>',
          info: '<svg xmlns="http://www.w3.org/2000/svg" class="toast-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>'
        };

        const messageText = i18n.t ? i18n.t(message) : message;
        
        toast.innerHTML = `
          ${icons[type] || icons.info}
          <span class="toast-message">${messageText}</span>
          <button class="toast-close" onclick="this.parentElement.remove()">✕</button>
        `;
        
        container.appendChild(toast);
        
        setTimeout(() => {
          toast.remove();
        }, 5000);
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      if (typeof router !== 'undefined' && typeof i18n !== 'undefined') {
        router.init();
        i18n.init().then(() => {
          if (typeof FilesPage !== 'undefined') {
            FilesPage.init();
          }
        });
      }
    });
  </script>
</body>
</html>
